<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" width="1200" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bgGrad)"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="200" y1="0" x2="200" y2="340"/>
    <line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
    <line x1="1000" y1="0" x2="1000" y2="340"/>
  </g>

  <!-- Forecast sparkline (right side decoration) -->
  <g filter="url(#glow)" opacity="0.7">
    <polyline
      points="720,260 760,220 800,240 840,180 880,200 920,140 960,160 1000,110 1040,130 1080,80 1120,100 1160,55 1200,70"
      fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
    <!-- Forecast continuation (dashed) -->
    <polyline
      points="1100,95 1140,60 1180,40 1220,25"
      fill="none" stroke="#06b6d4" stroke-width="2" stroke-dasharray="8,4" opacity="0.9"/>
    <!-- Confidence band -->
    <polygon
      points="960,160 1000,110 1040,130 1080,80 1120,100 1160,55 1200,70 1200,100 1160,95 1120,140 1080,120 1040,165 1000,145 960,200"
      fill="#6366f1" opacity="0.12"/>
    <!-- Data points -->
    <circle cx="720" cy="260" r="4" fill="#06b6d4"/>
    <circle cx="800" cy="240" r="4" fill="#06b6d4"/>
    <circle cx="880" cy="200" r="4" fill="#06b6d4"/>
    <circle cx="960" cy="160" r="4" fill="#06b6d4"/>
    <circle cx="1040" cy="130" r="5" fill="#a78bfa" opacity="0.9"/>
    <circle cx="1120" cy="100" r="5" fill="#a78bfa" opacity="0.9"/>
    <!-- "Forecast" annotation -->
    <line x1="1010" y1="100" x2="1010" y2="55" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="1015" y="50" fill="#a78bfa" font-family="monospace" font-size="12">forecast →</text>
  </g>

  <!-- Pill badges (top) -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="11">
    <rect x="80" y="28" width="72" height="22" rx="11" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="1"/>
    <text x="116" y="43" fill="#a5b4fc" text-anchor="middle">MLflow</text>

    <rect x="164" y="28" width="56" height="22" rx="11" fill="#06b6d4" opacity="0.25" stroke="#06b6d4" stroke-width="1"/>
    <text x="192" y="43" fill="#67e8f9" text-anchor="middle">Kafka</text>

    <rect x="232" y="28" width="70" height="22" rx="11" fill="#8b5cf6" opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
    <text x="267" y="43" fill="#c4b5fd" text-anchor="middle">FastAPI</text>

    <rect x="314" y="28" width="88" height="22" rx="11" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="1"/>
    <text x="358" y="43" fill="#6ee7b7" text-anchor="middle">Streamlit</text>

    <rect x="414" y="28" width="70" height="22" rx="11" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="1"/>
    <text x="449" y="43" fill="#fcd34d" text-anchor="middle">Docker</text>
  </g>

  <!-- Main title -->
  <text x="80" y="145" font-family="'Segoe UI', 'SF Pro Display', sans-serif"
        font-size="48" font-weight="900" fill="url(#titleGrad)" filter="url(#glow)">
    Adaptive Demand Forecasting
  </text>
  <text x="80" y="195" font-family="'Segoe UI', sans-serif"
        font-size="24" font-weight="400" fill="#94a3b8">
    Real-Time · Self-Learning · Enterprise-Grade
  </text>

  <!-- Model pills (lower) -->
  <g font-family="monospace" font-size="12">
    <rect x="80" y="220" width="80" height="26" rx="5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
    <text x="120" y="238" fill="#a5b4fc" text-anchor="middle">XGBoost</text>

    <rect x="172" y="220" width="84" height="26" rx="5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
    <text x="214" y="238" fill="#a5b4fc" text-anchor="middle">LightGBM</text>

    <rect x="268" y="220" width="80" height="26" rx="5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
    <text x="308" y="238" fill="#a5b4fc" text-anchor="middle">CatBoost</text>

    <rect x="360" y="220" width="74" height="26" rx="5" fill="#1e1b4b" stroke="#06b6d4" stroke-width="1"/>
    <text x="397" y="238" fill="#67e8f9" text-anchor="middle">Prophet</text>

    <rect x="446" y="220" width="56" height="26" rx="5" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="474" y="238" fill="#c4b5fd" text-anchor="middle">LSTM</text>

    <rect x="514" y="220" width="50" height="26" rx="5" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="539" y="238" fill="#c4b5fd" text-anchor="middle">GRU</text>

    <rect x="576" y="220" width="110" height="26" rx="5" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1"/>
    <text x="631" y="238" fill="#c4b5fd" text-anchor="middle">Transformer</text>
  </g>

  <!-- Bottom stats bar -->
  <rect x="0" y="290" width="1200" height="50" fill="#ffffff06"/>
  <g font-family="monospace" font-size="13" fill="#94a3b8">
    <text x="80" y="320">🔮 7 Models</text>
    <text x="210" y="320">📊 8 Dashboard Pages</text>
    <text x="410" y="320">⚡ Real-Time Kafka</text>
    <text x="590" y="320">🔬 SHAP Explainability</text>
    <text x="790" y="320">🌊 Drift Detection</text>
    <text x="960" y="320">🚀 Docker · AWS · GCP</text>
  </g>

  <!-- Animated pulse dot (static representation) -->
  <circle cx="1160" cy="28" r="6" fill="#22c55e" opacity="0.9"/>
  <circle cx="1160" cy="28" r="12" fill="#22c55e" opacity="0.2"/>
  <text x="1140" y="47" fill="#22c55e" font-family="monospace" font-size="10" text-anchor="middle">LIVE</text>
</svg>
