[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008", "UP007"]
exclude = ["notebooks/", ".venv/", "venv/"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.venv
  | venv
  | notebooks
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip_glob = ["venv/*", ".venv/*", "notebooks/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow",
    "integration: integration tests",
    "api: API tests",
]

[tool.coverage.run]
source = ["src", "api"]
omit = ["*/tests/*", "*/__init__.py", "*/notebooks/*"]

[tool.coverage.report]
fail_under = 85
show_missing = true
